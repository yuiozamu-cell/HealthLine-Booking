{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <!-- Progress Bar -->
        <div class="progress mb-4" style="height: 25px;">
            <div class="progress-bar bg-primary" role="progressbar" style="width: 20%;" aria-valuenow="20" aria-valuemin="0" aria-valuemax="100">Step 1: Category</div>
        </div>
        
        <h2 class="mb-4 text-center">Select a Category</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <form action="{{ url_for('book_step1') }}" method="POST">
<style>
    .service-card {
        transition: all 0.3s ease;
        border: 2px solid transparent !important;
        border-radius: 12px;
    }
    .service-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(43, 108, 176, 0.15) !important;
        border-color: rgba(43, 108, 176, 0.3) !important;
    }
    .service-card:has(input[type="radio"]:checked) {
        border-color: #2B6CB0 !important;
        background-color: #EBF8FF !important;
    }
    .service-card input[type="radio"] {
        cursor: pointer;
    }
</style>
                    <div class="row g-3 mb-4">
                        {% for c in categories %}
                        <div class="col-md-6">
                            <label class="card h-100 service-card shadow-sm" style="cursor: pointer;">
                                <div class="card-body">
                                    <div class="d-flex align-items-center mb-2">
                                        <input class="form-check-input me-3 mt-0" type="radio" name="category_id" value="{{ c.id }}" required style="transform: scale(1.2);">
                                        <h5 class="card-title mb-0 fw-bold" style="color: #2A4365;">{{ c.name }}</h5>
                                    </div>
                                    <p class="card-text text-muted small mt-2">{{ c.description }}</p>
                                </div>
                            </label>
                        </div>
                        {% else %}
                        <div class="col-12">
                            <div class="alert alert-warning">No categories available at the moment.</div>
                        </div>
                        {% endfor %}
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('user_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" {% if not categories %}disabled{% endif %}>Next: Select Service</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
