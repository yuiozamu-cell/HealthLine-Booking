{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <!-- Progress Bar -->
        <div class="progress mb-4" style="height: 25px;">
            <div class="progress-bar bg-primary" role="progressbar" style="width: 60%;" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">Step 3: Doctor</div>
        </div>
        
        <h2 class="mb-4 text-center">Select a Doctor</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <form action="{{ url_for('book_step3') }}" method="POST">
                    <div class="list-group mb-4">
                        {% for doc in doctors %}
                        <label class="list-group-item list-group-item-action">
                            <input class="form-check-input me-1" type="radio" name="employee_id" value="{{ doc.id }}" required>
                            <strong>Dr. {{ doc.name }}</strong>
                            {% if doc.availability %}
                            <p class="mb-0 text-muted"><small><i class="bi bi-clock"></i> Available: {{ doc.availability }}</small></p>
                            {% endif %}
                        </label>
                        {% else %}
                        <div class="alert alert-warning">No doctors available for this service at the moment.</div>
                        {% endfor %}
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('book_step2') }}" class="btn btn-outline-secondary">Back to Service</a>
                        <button type="submit" class="btn btn-primary" {% if not doctors %}disabled{% endif %}>Next: Date & Time</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
