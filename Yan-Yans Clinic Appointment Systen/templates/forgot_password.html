{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-primary">Forgot Password</h3>
                <p class="text-muted text-center mb-4">Enter your registered email address below, and we will send you a 6-digit verification code to reset your password.</p>
                
                <form action="{{ url_for('forgot_password') }}" method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary fw-bold">Send Reset Code</button>
                    </div>
                    <div class="text-center">
                        <a href="{{ url_for('login') }}" class="text-decoration-none text-muted"><small>Back to Login</small></a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
