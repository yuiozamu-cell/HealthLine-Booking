{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 text-primary">Verify Code</h3>
                <div class="alert alert-info text-center small mb-4">
                    A 6-digit verification code has been sent to <strong>{{ session.get('reset_email') }}</strong>. Please enter it below.
                </div>
                
                <form action="{{ url_for('verify_reset_code') }}" method="POST">
                    <div class="mb-4">
                        <label for="reset_code" class="form-label text-center d-block">6-Digit Code</label>
                        <input type="text" class="form-control text-center fs-4 letter-spacing-2" id="reset_code" name="reset_code" required maxlength="6" pattern="\d{6}" placeholder="------" autocomplete="off" style="letter-spacing: 0.5rem; font-weight: bold;">
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary fw-bold">Verify Code</button>
                    </div>
                    <div class="text-center">
                        <a href="{{ url_for('login') }}" class="text-decoration-none text-muted"><small>Cancel and return to Login</small></a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
