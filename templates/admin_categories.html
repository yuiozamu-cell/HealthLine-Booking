{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Manage Categories</h2>
</div>

<div class="row">
    <div class="col-md-4">
        <h4 class="mb-3">Add Category</h4>
        <div class="card shadow-sm border-primary" style="border-top: 4px solid #0d6efd !important;">
            <div class="card-body">
                <form action="{{ url_for('admin_categories_page') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Category Name</label>
                        <input type="text" class="form-control" name="name" required placeholder="e.g. Consultations">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Add Category</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <h4 class="mb-3">Existing Categories</h4>
        <div class="card shadow-sm border-primary" style="border-top: 4px solid #0d6efd !important;">
            <div class="card-body">
                <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                    <table class="table table-hover align-middle mb-0">
                        <thead>
                            <tr>
                                <th>Category Name</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for c in categories %}
                            <tr>
                                <td><strong>{{ c.name }}</strong></td>
                                <td>{{ c.description }}</td>
                                <td>
                                    <button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editCatModal{{ c.id }}">Edit</button>
                                    <a href="{{ url_for('delete_category', id=c.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure? This will delete the category and may affect linked services.')">Delete</a>
                                </td>
                            </tr>
                            
                            <!-- Edit Category Modal -->
                            <div class="modal fade" id="editCatModal{{ c.id }}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <form action="{{ url_for('edit_category', id=c.id) }}" method="POST">
                                            <div class="modal-header bg-primary text-white">
                                                <h5 class="modal-title">Edit Category</h5>
                                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                                            </div>
                                            <div class="modal-body">
                                                <div class="mb-3">
                                                    <label class="form-label fw-bold">Category Name</label>
                                                    <input type="text" class="form-control" name="name" value="{{ c.name }}" required>
                                                </div>
                                                <div class="mb-3">
                                                    <label class="form-label fw-bold">Description</label>
                                                    <textarea class="form-control" name="description" rows="3">{{ c.description }}</textarea>
                                                </div>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                                <button type="submit" class="btn btn-primary fw-bold">Save Changes</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            {% else %}
                            <tr><td colspan="3" class="text-center py-3 text-muted">No categories added yet.</td></tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
